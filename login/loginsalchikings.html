<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
 <header class="bg-amber-800 p-4 text-white">
        <h1 class="text-3xl font-bold">Salchiking</h1>

        <nav class="text-lg mt-4">
<body>
    <div class="flex items-center justify-center min-h-screen bg-gray-100">
        <div class="bg-black p-8 rounded-lg shadow-md w-full max-w-md">
            <h2 class="text-2xl font-bold mb-6 text-center">Iniciar Sesión</h2>
            <form action="#"  class="space-y-4">
                <div>
                    <label for="username" class="text-black block text-sm font-medium text-gray-700">Usuario</label>
                    <input type="text" id="username" name="username" required class="mt-1 text-black w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-amber-500 focus:border-amber-500">
                </div>
                <div>
                    <label for="password" class="text-black block text-sm font-medium text-gray-700">Contraseña</label>
                    <input type="password" id="password" name="password" required class="mt-1 text-black block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-amber-500 focus:border-amber-500">
                </div>
                <button type="submit" class="w-full bg-amber-800 text-white py-2 rounded hover:bg-amber-700">Iniciar Sesión</button>
            </form>
        </div>
</body>
</html>
