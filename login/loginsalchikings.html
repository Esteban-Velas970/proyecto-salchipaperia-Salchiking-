<!DOCTYPE html>

<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Salchiking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../login/loginsalchikings.js"></script>
</head>

<body class="bg-gray-100">


<!-- HEADER -->
<header class="bg-amber-800 p-4 text-white">
    <h1 class="text-3xl font-bold">Salchiking</h1>
</header>

<!-- LOGIN INICIO DE SESION -->
<div class="flex items-center justify-center min-h-screen">
    <div class="bg-black p-8 rounded-lg shadow-md w-full max-w-md">
        <h2 class="text-2xl font-bold mb-6 text-center text-white">Iniciar Sesión</h2>

        <form onsubmit="iniciarSesion(event)" class="space-y-4">

            <div>
                <label class="text-white block text-sm font-medium">Usuario</label>
                <input type="text" id="usuario" required 
                class="mt-1 w-full px-3 py-2 text-black border rounded-md">
            </div>

            <div>
                <label class="text-white block text-sm font-medium">Contraseña</label>
                <input type="password" id="contraseña" required 
                class="mt-1 w-full px-3 py-2 text-black border rounded-md">
            </div>

            <button type="submit" 
            class="w-full bg-amber-800 text-white py-2 rounded hover:bg-amber-700">
                Iniciar Sesión
            </button>

        </form>
    </div>
</div>




</body>
</html>
